[Module/feature name] Commit Message Title
# This line contains two parts:
# 1. [Module/feature name]: The main area of the codebase affected by this change.
#    - Keep it short and specific.
#    - Examples: auth, api_handler, db_migration, cache, user_profile, etc.
#    - AI Hint: Analyze the diff to determine which module or feature is primarily impacted.
#
# 2. Commit Message Title: A concise summary of what the change does, starting with an imperative verb.
#    - Keep it under 50 characters if possible.
#    - Focus on *what* was done, not *why* (details go in the Description section).
#    - Examples: Fix token refresh bug, Add user avatar upload, Refactor auth middleware.
#    - AI Hint: Generate a clear, action-oriented title that summarizes the key change.

[Description]
# Describe the changes made in more detail.
# AI Hint: Summarize the key changes based on the diff. Use clear and concise language.
# - What functionality was added, modified, or fixed?
# - Highlight any changes that might impact other modules.
# - Mention if any dependencies, APIs, or configs were updated.
# - Use bullet points or a short paragraph for readability.
# Example:
# - Refactored login flow for faster response time.
# - Added caching to API responses to reduce DB load.
# - Fixed race condition in user session handling.

[Motivation]
# Explain why this change is necessary.
# AI Hint: Identify the purpose of the change.
# - Is this a bug fix, performance improvement, or new feature?
# - If related to a ticket/issue, mention the reference.
# - Describe the problem that this change addresses.
# Example:
# - Resolves issue #123 where users could not log in after session timeout.
# - Improves query performance by adding indexes.

[Self-Test]
# Describe the tests performed before committing
# AI Hint:
# Review the code changes in this commit and infer the relevant self-tests that should be performed before submission.
# Provide a clear checklist of recommended tests based on the commit content.
# Consider the following when generating the list:
# - What parts of the system are affected (logic, UI, configuration, documentation)?
# - Which testing methods are most relevant (unit, integration, manual, CI build)?
# - Are there dependencies, side effects, or external APIs to verify?
# If no testing is required (e.g., documentation or comments only), state that explicitly.
#
# Output format example:
# - Build and compile successfully.
# - Run updated unit tests and confirm they pass.
# - Manually verify new API response in Postman.
# - Check UI rendering in Chrome and Firefox.
# - No testing required (documentation-only change).

# ## AI Review Session ##
# Describe: Internal pre-commit self-review. Do NOT include this section in the commit.
#
# AI Hint: Please follow the steps beflow to finish the review.
# Every line in this block must start with '#' so Git treats it as a comment.
# STEP 1 — Read the diff
# - Enumerate every file changed and the kind of change: add / modify / delete / rename.
# - For each file, identify the function or block where the change lives.
# - Skip files that aren't source code (configs, generated files, lockfiles) unless they have logic.
#
# STEP 2 — Check each concern. Skip any concern that does not apply.
# - Correctness : wrong logic, off-by-one, wrong return value, wrong operator, wrong condition.
# - Safety      : uninitialized vars, resource leaks, use-after-free, error paths, missing rollback.
# - Security    : injection, path traversal, hardcoded secrets, missing auth, weak crypto, unsafe deserialization.
# - Readability : unclear names, magic numbers, missing comments on non-obvious code, dead code.
# - Performance : unnecessary copies, O(n^2) loops, blocking I/O on hot paths, repeated regex compile.
# - Compat      : API/ABI breaks, deprecated calls, platform-specific code without guards.
# - Tests       : new behavior with no test, untested edge cases, removed coverage, flaky test risk.
#
# STEP 3 — Output one line per finding, in this exact format:
#   # AI <Severity> ('<file>[:<line>]'): <one concrete suggestion>
# Allowed Severities: Critical | Warning | Note
# Rules:
#   - Quote the file path exactly. Add ':<line>' when you can name the line.
#   - State ONE concrete fix, not a vague topic. No 'consider X' without saying what to do.
#   - If a concern has no finding, output nothing for it — silence is correct.
#   - Prefer fewer, higher-signal findings over many low-value notes.
#
# STEP 4 — Verdict (the last line of the block):
#   # AI Verdict: <one-sentence risk summary>
# - If you raised any Critical, restate the count: "N critical issue(s) — must fix before commit."
# - Otherwise summarize the risk: low / medium / high, and why in one sentence.
#
# # Output format example:
# # AI Critical ('auth/session.c:42'): token is freed twice on the error path — remove the second free or set ptr to NULL.
# # AI Warning  ('db_migration.sql'): SELECT * will break when new columns are added — list columns explicitly.
# # AI Note     ('user_profile.py'): user.getProfile() can return None on cache miss — add a None check before use.
# # AI Verdict: low risk, refactor only, no behavior change.

